name: deploy audio-chat

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            echo "🚀 Iniciando deploy..."

            DEPLOY_DIR="deploys/audio-chat"

            echo "🧹 Limpando deploy antigo..."
            rm -rf $DEPLOY_DIR

            echo "📦 Clonando repositório..."
            git clone https://GabrielMouraGit:${{ secrets.GIT_TOKEN }}@github.com/GabrielMouraGit/reactive-audio-connection.git $DEPLOY_DIR

            cd $DEPLOY_DIR

            echo "🛑 Parando containers antigos..."
            sudo docker compose down || true

            echo "🔨 Buildando e subindo containers..."
            sudo docker compose up --build -d --remove-orphans

            echo "✅ Deploy finalizado com sucesso!"
