version: "3.9"

services:
  app:
    build: .
    container_name: audio-chat-app
    restart: always
    ports:
      - "3000:3000"
      - "3005:3005"

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app